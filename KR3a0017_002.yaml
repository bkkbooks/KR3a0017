body:
  text: 續孟子卷下唐林慎思撰咸丘蒙八咸丘蒙問曰吾聞諸仲尼立身揚名以顯父母孝之終也舜瞽叟有不父之名何也孟子曰瞽叟不父天顯之也天生大孝于舜使化天下之人也故不生于帝裔而生于庶人不事于常父而事于瞽叟生帝裔則身先貴也身先貴則何以育兆人乎事常父則心先安也心先安焉能成大化之節乎是以取庶人之窮以處舜則使舜無怠矣命瞽叟之惡以化舜則使舜無怨矣然後率天下之為人子者得不慕舜之行邪戒天下之為人父者得不懲瞽叟之惡邪所以舜有大孝之名由瞽叟化之瞽叟有不父之名由天顯之齊宣王九齊宣王問孟子曰吾欲任忠去邪用得其當唯左右前後賢不肖孰辨邪孟子曰用之而已矣王曰惡知可用而用乎曰王誠不見所以用也夫材既伐矣離于山谷處于庭廡久則墟墁以封苔蘚以周目之于外誠不分其松櫟也在斧以削之斤以斫之索其內然後辨矣賢不肖在王之左右誠久矣進退以恭言容以莊目之于外誠不分其賢不肖也在祿以誘之勞以處之索其內然後辨矣王苟不用則賢不肖何以别乎萬章十萬章問曰夫子所謂禹稷顔回同道使易地則皆然然則禹以治水之功著使回易禹其能治水乎稷以播種之功著使回易稷其能播種乎孟子曰惡是何言歟夫山者狩水者漁皆捕于物也善捕于物使狩反于水必能為漁焉漁反于山必能為狩焉禹稷居平世而顯其功非山者狩乎顔回居亂世而守其道非水者漁乎苟禹稷逰于孔門名不後于四科必矣其與狩者反于水漁者反于山何以異乎宋臣十一孟子問宋臣曰子之王于民何如曰撫之曰何以撫邪曰民未及歉則開廩以賑之不使民歉也民未及寒則散帛以給之不使民寒也孟子曰吁子之王曾不若魯民也子知魯民善教子取薪乎南山百里有薪也北園百步有薪也命子曰汝採薪欲山乎園乎其子曰園近願採諸園魯民曰汝勿以近為易而採也勿以逺為難而不採也且近是我家之薪逺是天下之薪也我家之薪人不敢採之以天下之薪盡則我家之薪存焉天下之薪汝胡不先採之以我家之薪盡則天下之薪何有哉子之王于民猶此也民有耕織猶南山有薪不待取其耕織而賑之給之是知魯民教子乎以恩樂于民不知民樂為惰民惰則何取乎莊暴十二莊暴問孟子曰鯀遭舜殛禹受舜禪其為孝乎孟子曰禹之孝在乎天下不在乎一家也夫鯀遭舜殛公也禹受舜禪亦公也舜不以禹德可立而不殛鯀是無私于禹也禹不以父讎可報而不受禪是無私于舜也且舜哀天下之民于墊溺也命禹治之禹能不私一家之讎而出天下之患也此非禹之孝在乎天下而不在乎一家歟苟私一家之讎而忘天下之患則何以為禹之孝故孔子曰禹吾無間然矣其是之謂乎彭更十三孟子居休嘆曰天富吾道不使齊王用吾豈吾之過歟彭更曰夫子何為急急乎且善醫者不自造他户必待媒而後行善相者不自俟他顔必待求而後動自造他户雖善醫人不得不疑自俟他顔雖善相人不得不賤矣今夫子不為齊王用豈不由自造自俟而使疑且賤乎孟子曰噫汝之言蔽矣夫路有囊金迷于夜而不止者將入冦盜之境非有仁人導而出之不能免其害矣今齊王昏昧若迷于夜也冦盜之害將生亂亡無日矣吾非不仁之人安能忍其害生不導之而出邪所以急急于齊王豈以求用為心哉然而王不用吾所導是以嘆也詎同醫相之心而懷其利乎陳臻十四陳臻問曰堯有天下皆謂比屋可封然而四凶在庭亦可封邪紂有天下皆謂比屋可誅然而三仁在側亦可誅邪孟子曰以其大而舉之不以其小而廢之也堯之仁也化天下皆如堯之仁矣不以四凶不可封而廢天下可封也紂之戾也化天下皆如紂之戾矣不以三仁不可誅而廢天下可誅也且舉目于洪海必曰水瀰天矣雖旁有洲島豈能廢瀰天之言乎馳心于巨嶽必曰勢接霄漢矣雖上隔空虛豈能廢接霄漢之言乎比屋可封若洪海瀰天也四凶猶洲島矣遙望瀰天孰計洲島邪比屋可誅若巨嶽接霄漢也三仁猶虛空矣仰見霄漢孰計虛空邪所謂以其大而舉之不以其小而廢之不亦昭昭歟續孟子卷下
