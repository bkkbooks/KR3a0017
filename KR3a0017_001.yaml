body:
  text: 續孟子卷上唐林慎思撰梁大夫一梁大夫見孟子問曰吾聞夫子教王遠利而易以仁義有諸孟子曰然大夫曰吾家有民見凍飢于路者非其親而救之脫衣以衣之輟食以食之及已凍餓幾死是其親而不救之而何孟子曰噫是大夫從王厚利而薄仁義故也厚利率民民爭貪欲苟有獨持仁義者宜乎不得全其身矣昔楚有靳氏父子相傳以溫鴆醉人者客過其門則欲之未嘗不斃于路矣卒有孺子能哀客而告之然後鴆十九不行焉洎靳氏怒反鴆孺子矣然而靳氏家習不仁也孺子身盜為仁矣一身盜為仁而罪一家習不仁其家孰容乎今大夫有仁能救民之凍飢也是謂身盜為仁矣及己之凍餓不得人之救者豈非其家不容乎大夫苟能與王移厚利之心而在仁義移薄仁義之心而在利則上下移矣然而仁義非盜而有也欲人不容其可得乎故易曰立人之道曰仁與義梁襄王二梁襄王使人求于孟子孟子再往襄王儀服不整而見孟子孟子曰詩云敬慎威儀維民之則王每見軻若此何以則民乎王曰吾以天下未定國無以安方惕惕然貯憂乎中豈遑以威儀為務乎孟子曰王苟能恩信來其民必先以容儀正其身夫禮存不以寒暑也暑可畏得以袒膚為敬乎寒可懼得以縮臂為恭乎王謂憂國未安不遑以容儀為務何異畏暑而袒膚懼寒而縮臂邪苟王憂國既然則大夫憂家士庶憂身亦然咸曰不遑以容儀為務使上下無儀矣君臣父子何以則乎梁襄王矍然曰吾敬從夫子之教樂正子三樂正子見孟子曰吾國之君常耽酒嗜音俾俗不治克欲以治道諫之夫子何以教克孟子曰魯君耽嗜與民同之則其庶幾乎他日魯平公備樽罍之器陳金石之音樂正子曰君獨好此致魯俗不治不若與民同之則其庶幾乎平公遂召致魯民卒命樽罍俱執使金石咸奏魯民大酣他日俗益不治樂正子復見孟子告之孟子曰吾昔教子諫魯君耽嗜與民同之君反若是貽民之怨豈謂與民同邪且禽必棲于木魚必泳于川使易禽于籠孰若木之安乎移魚于沼孰若川之樂乎民居魯國若禽之在木魚之在川也魯君耽嗜召民于側是猶易禽于籠移魚于沼也使民且恐且懼豈暇耽嗜而同于君乎吾所謂與民同者均役于民使民力不乏均賦于民使民用常足然後君有餘而宴樂民有餘而歌詠夫若此豈不謂與民同邪詩云假樂君子顯顯令德宜民宜人受祿于天此之謂也樂正子復以是諫平公平公不悅臧倉曰克之所陳孟軻之言也曩君欲乘輿出見孟子臣常諫之今孟子怨君不見故教克惑君君惡信是哉平公怒他日有人告于孟子孟子曰天富道于豫魯國之君其能窮豫乎公都子四公都子問曰吾聞諸齊人言蚳蛙所以諫于王而不用致為臣而去是夫子之謀邪孟子曰然公都子曰齊人有言曰夫子能為蚳蛙不能自為而何孟子曰齊人安知吾之所為乎夫吾所以疾脫蚔蛙非他也以昵王故耳汝聞齊姑之欲殺人乎嘗命其婦與焉婦有不忍從者呼鄰女為謀而脫之然而鄰女不親于齊婦也殺人未嘗與也所以為齊婦謀者齊婦之急也不為己謀者于己非急也今蚳蛙誠猶齊婦也齊王面南蚳蛙面北吾未嘗與焉所以為蚳蛙謀者于我能急邪汝信齊人言齊人安知吾所為乎髙子五孟子將去齊髙子曰王欲授夫子室夫子舍之而去然王意于夫子不為不厚矣夫子或缺所以王必補之今何為不止孟子曰吾嘗觀齊王之意也先有執雅樂之器進于王王始重之使奏而未嘗樂也後有執靡聲之器進于王王始輕之使奏而未嘗舍也然而執雅樂之器者王雖未棄王終不能用矣是執雅聲以得罪于王也今吾以王之未棄也若受王之祿居王之室王終不能矣是媒吾身以得罪于王也不亦甚乎吾幸去何適而不遇哉孔子曰邦有道穀邦無道穀恥也公孫丑六孟子去齊反鄒止于晝公孫丑髙子從晝人有惑于孟子曰齊王能悔過修德日新其道鄒之民聞于路夫子何適哉孟子不懌徑宿于晝髙子以為孟子信晝人之言而欲不行乃謂公孫丑曰晝人之言于夫子夫子信乎公孫丑曰諾豫請問之入曰衆人之言信偽孰多孟子曰偽多曰能言天不覆地不載乎曰甚于斯言天不覆地不載是露其機而先見其偽先見其偽欲惑于人其可得乎隱其機而難知其偽欲人不惑其可得乎且設穽于野隱其機也獸不知其防則觸而入矣設偽于國隱其機也人不知其防則觸而入矣曰孰不懼邪曰君子周防其身何懼公孫丑出曰夫子不信晝人之言哉屋廬子七孟子適任見季子喜欲授孟子祿孟子辭而去屋廬子憮然曰連敢問昔夫子居鄒任君嘗以幣交之夫子受今之任任君復以祿授之夫子不受何也曰汝聞孔氏不疑之盜乎不疑宋人也好饋食于士士有館于孔氏者未嘗不罹其盜焉然而不疑豈真盜邪家有無肖之氓矣不疑非好士邪反貽盜之名矣今任君待吾誠猶孔氏好士焉左右無肖非為任君盜邪吾今罹盜之人也吾苟不去未始能報任君也適足以貽任君為盜之名續孟子卷上
