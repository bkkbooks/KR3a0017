body:
  text: 續孟子儒家類提要臣等謹案續孟子二卷唐林慎思撰慎思字䖍中長樂人咸通十年進士十一年又中宏詞拔萃魁授秘書省校書郎興平尉尋除尚書水部郎中守萬年縣令黄巢之亂抗節不屈死之崇文總目及鄭樵通志藝文略皆載是書二卷與今本合崇文總目載慎思之言曰孟子七篇非軻自著書而弟子共記其言不能盡軻意因傳其説演而續之今觀其書十四篇大抵因孟子之言推闡以盡其義獨其不自立論而必假借姓氏類乎莊列之寓言又如與民同樂本莊暴齊王之事而移于隔章之樂正子魯君義頗無取然其委曲發明亦時有至理不可廢也昔揚雄作太元以擬易王通作中説以擬論語儒者皆有僭經之譏蔡沈作洪範九疇數御纂性理精義亦以其僭經斥之不錄慎思此書頗蹈此弊然唐時孟子不號為經故馬總意林與諸子之書並列而韓愈亦與荀揚並稱固不能以後來論定之制為慎思責矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀續孟子原序自文中子有續經書唐水部郎林䖍中亦有續孟子然續經竟無傳者郊畤之責而續孟今行於世者有名孫元復焉七篇之書先儒謂最有功於聖門而温國文正公乃作疑孟至謂瞽叟殺人非孟子之言韓昌黎固嘗謂軻之書非自著其徒萬章公孫丑相與記軻所言程子遂以瞽象之事乃萬章傳聞之誤爾續孟之作乂豈非阮逸所謂萬章公孫丑不能極師之奥盡録其言故孟氏章句畧而多闕今觀水部公出其仁義之言而善於敷演亦長於譬喻如曰堯之比屋可封不有四凶乎紂之比屋可誅不有三仁乎以其大而舉之不以其小而廢之斯言盖得之矣不寧唯是孟子言必及仁義公之治邑民懐其恵臨難不求苟免仁之至義之盡可謂善學孟子者矣克齋林公稱為吾閩千載不朽之士豈吾欺哉咸淳癸酉上春莆田劉希仁書敘曰堯舜周孔之道至孟軻斬焉不傳伸䝉子作書續孟此其自任者豈淺淺也然生值唐亂官不過令長才志不見知於時斥罵逆巢抗首白刃孟氏可作顧不謂之豪傑大丈夫哉所恨事不載史徒得故老傳説四五百年不休續孟伸蒙子卷目雖具藝文志今世所傳者殆放失其本真矣史書果可盡信哉可傳者不録所録者又將冺冺而無傳伸䝉子何為其生死不幸也哉元統三年南康曹侯明源來宰長樂始訪其子孫於稠巖之野為之築室立祠表其大節而暴之天下耳目是不唯以昭忠烈正人倫亦使時俗知為善之可願雖掩抑百年猶遇仁賢君子以傳其名也余既悲伸䝉之志又嘉曹侯之為政能有所建明故為之敘贊以見有善者名無不聞而循吏之化民成俗固自有道也贊曰唐室不兢以利稗政上替下陵用勦民命維閩伸蒙抗志續孟昌言仁義以藥時病不能者天出宰萬年巢賊稱帝萬乘南遷百僚鼠竄比肩從叛一人抗節羣醜駭亂䝉死則那偷生幾何較其短長得喪孰多夫既殞身遑恤厥名紀録失官惟國無人邑老相傳彌逺彌在將五百年始遇賢宰賢宰為誰明源曹公美俗旌賢不泥簿文躬駕之野訪求後昆樹祠學宫風於四逺匪私伸䝉忠義是勸稠巖之隂青青楓林胡晦於昔而白於今我師子輿好善是喜勒辭巖石彰其徳美三山吳鑑明之序孟子稱能言距楊墨者聖人之徒也夫能言未必能行孟子直以聖人之徒與之不已過乎言者既與則行者可知己伸䝉子續孟之作將以言詔天下者也余謂伸䝉方著書時未必先知其身之死於賊伸䝉既以義死續孟雖不作可也書之存亡史之得失又焉能為伸䝉子之有無立祠表義伸䝉亦何心之有抑人心之所以不死者其在是乎三山陳英觀序孟子談仁義數萬言一以正人心為己任伸䝉子續孟其有孟氏之志乎哉然伸䝉處黄巢之亂以萬年令罵賊死官方其罵賊豈不知其必死哉義在於死而不利於苟生也質之孟氏非所謂真知義利之辨者哉漢揚雄擬論語作法言既而背漢仕莽是雄非特漢罪人固聖門之罪人已即雄而視伸䝉子豈可同日而語哉昔朱文公作通鑑綱目書雄為新莽大夫今南康曹侯築室以祠伸䝉曹侯之心即文公之心者也噫使天下邑宰皆如曹之用心世道其不復古乎永陽黄堯臣跋予未冠時嘗見林東一先生寳其上世伸䝉子書同先君乞言於三山諸先輩至正癸卯予舘於林氏與其弟行一君及其子仲連詳閲其書其間序跋若林若吳若黄若陳皆先君友執予所嘗師事者也即言而求人已不可得於今日况伸䝉子生數百載之上哉慨然退思不覺涕下主人因集而出之以附於後併請予誌之以見一時之意云伸䝉子著書於槐里其自序曰如有用吾吾言其施吾學其行其自負之重乃如此設使終身不達抱空言而死於槐里伸䝉子不終於䝉也哉及其出萬年為宰其言亦既施矣然而終不能救唐之亡者所施不遐也設使以夀終於其邑則其所施止於是所施止於是所言過於是伸䝉子將不近於誣也哉惟其罵巢而死是以平昔之言皆足以取信於天下後世而其重若泰山伸䝉猶不死矣雖然士有不幸不得行其志以實其言者古今何限惟真有所見者其平昔之言自闕則伸䝉雖終身不逹雖不罵賊而死余以為竒士然則言以見志亦士之所不能無也哉至正十三年嵗在昭陽单閼夏四月三山學士陳留孫謹誌
